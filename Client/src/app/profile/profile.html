<div class="min-h-[calc(100vh-80px)] bg-surface-50 dark:bg-surface-950 p-6 md:p-12">
  <div class="max-w-3xl mx-auto flex flex-col items-center">
    
    <div class="bg-surface-0 dark:bg-surface-900 shadow-xl rounded-2xl border border-surface-200 dark:border-surface-800 p-8 w-full relative overflow-hidden">
      <!-- Decorative background top -->
      <div class="absolute top-0 left-0 right-0 h-32 bg-primary-500"></div>
      
      <div class="relative z-10 flex flex-col items-center mt-12 mb-8">
        <p-avatar image="https://primefaces.org/cdn/primeng/images/avatar/amyelsner.png" size="xlarge" shape="circle" [style]="{'width':'120px', 'height':'120px', 'border':'4px solid var(--surface-0)'}" />
        <h2 class="text-3xl font-bold mt-4 text-surface-900 dark:text-surface-0 m-0">Amy Elsner</h2>
        <span class="text-surface-500 dark:text-surface-400 mt-1">amy.elsner@example.com</span>
      </div>

      <!-- Action Head -->
      <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-semibold text-surface-900 dark:text-surface-0 m-0">Personal Information</h3>
        <p-button [label]="isEditing ? 'Cancel' : 'Edit Profile'" [icon]="isEditing ? 'pi pi-times' : 'pi pi-pencil'" [severity]="isEditing ? 'secondary' : 'primary'" [text]="!isEditing" [outlined]="isEditing" (onClick)="toggleEdit()" />
      </div>

      <!-- Profile Form -->
      <form [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="flex flex-col gap-5">
        
        <div class="flex flex-col md:flex-row gap-5">
          <!-- First Name -->
          <div class="flex flex-col gap-2 flex-1">
            <label for="firstName" class="font-semibold text-surface-700 dark:text-surface-200 text-sm">First Name</label>
            <input pInputText id="firstName" formControlName="firstName" class="w-full" />
          </div>

          <!-- Last Name -->
          <div class="flex flex-col gap-2 flex-1">
            <label for="lastName" class="font-semibold text-surface-700 dark:text-surface-200 text-sm">Last Name</label>
            <input pInputText id="lastName" formControlName="lastName" class="w-full" />
          </div>
        </div>

        <!-- Email -->
        <div class="flex flex-col gap-2">
          <label for="email" class="font-semibold text-surface-700 dark:text-surface-200 text-sm">Email Address</label>
          <input pInputText id="email" formControlName="email" type="email" class="w-full" />
        </div>
        
        <!-- Company -->
        <div class="flex flex-col gap-2">
          <label for="company" class="font-semibold text-surface-700 dark:text-surface-200 text-sm">Company <span class="text-surface-400 font-normal">(optional)</span></label>
          <input pInputText id="company" formControlName="company" class="w-full" />
        </div>

        <div class="mt-4 flex justify-end" *ngIf="isEditing">
          <p-button type="submit" label="Save Changes" icon="pi pi-check" [disabled]="profileForm.invalid" />
        </div>
      </form>

    </div>
  </div>
</div>
