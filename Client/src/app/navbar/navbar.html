<header class="navbar-shell" [class.navbar-shell-scrolled]="isScrolled()">
  <div class="navbar-strip"></div>

  <div class="navbar-inner">
    <a class="brand" routerLink="/" aria-label="Go to home">
      <span class="brand-mark" aria-hidden="true"><i class="pi pi-link"></i></span>
      <span class="brand-text">Shortify</span>
    </a>

    <nav class="nav-links" aria-label="Primary">
      @for (link of navLinks; track link.label) {
        <a class="nav-link" [routerLink]="link.href">{{ link.label }}</a>
      }
    </nav>

    <div class="actions">
      <button
        pButton
        type="button"
        [icon]="themeIcon()"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        (click)="toggleTheme()"
        [attr.aria-label]="themeLabel()"
      ></button>

      <button
        pButton
        type="button"
        icon="pi pi-bell"
        [rounded]="true"
        [text]="true"
        severity="secondary"
        aria-label="Notifications"
      ></button>

      <button class="avatar-trigger" type="button" (click)="menu.toggle($event)" aria-label="Open profile menu">
        <p-avatar image="https://primefaces.org/cdn/primeng/images/avatar/amyelsner.png" shape="circle" size="normal" />
      </button>

      <p-menu #menu [model]="profileItems" [popup]="true" />
    </div>
  </div>
</header>
