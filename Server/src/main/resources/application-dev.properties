#PORT
server.port=8080

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/url_shortener_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# CONNECTION POOL
spring.datasource.hikari.pool-name=UrlShortenerDevPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# LOGGING
logging.level.org.hibernate.SQL=DEBUG

# URL CONFIG
app.base-url=https://short.ly
# app.default-expiry-days=30

#JWT CONFIG
jwt.secret=BilackDevil
jwt.token.expiry-in-min=60

#Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.password=root